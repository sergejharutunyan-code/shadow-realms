name: Build Debug APK

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent build per ref; cancel superseded runs.
concurrency:
  group: android-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Android debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --no-frozen-lockfile

      - name: Build web (Next.js static export -> out/)
        run: bun run build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: echo "path=$(find android -path '*apk/debug/*.apk' | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: shadow-realms-debug-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 30
